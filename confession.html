<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ 表白 ❤️</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ffe6f0, #fff0f5);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #ff1493;
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .message {
            font-size: 1.3em;
            color: #ff69b4;
            margin: 20px 0;
            line-height: 1.6;
        }
        .hearts {
            font-size: 2em;
            margin: 20px 0;
        }
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 120px;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .reject-btn {
            background: #ff6b6b;
            color: white;
        }
        .accept-btn {
            background: #4ecdc4;
            color: white;
        }
        .celebration {
            display: none;
            font-size: 2em;
            color: #ff1493;
            margin-top: 20px;
        }
        .final-plea {
            display: none;
            background: rgba(255, 182, 193, 0.8);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }
        @media (max-width: 480px) {
            .buttons {
                flex-direction: column;
                gap: 15px;
            }
            .btn {
                width: 100%;
                max-width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>❤️ 表白 ❤️</h1>
        <div class="hearts">💕💕💕</div>
        <div class="message">亲爱的，我喜欢你很久了！<br>你愿意做我女朋友吗？</div>

        <div class="buttons">
            <button class="btn reject-btn" id="rejectBtn">拒绝</button>
            <button class="btn accept-btn" id="acceptBtn">同意</button>
        </div>

        <div class="celebration" id="celebration">
            🎉 太好了！我们在一起啦！ 💕<br>
            💑❤️😍
        </div>

        <div class="final-plea" id="finalPlea">
            你真的要拒绝我吗？😢<br>
            再考虑一下吧！<br>
            💔
        </div>
    </div>

    <script>
        let rejectCount = 0;
        const rejectBtn = document.getElementById('rejectBtn');
        const acceptBtn = document.getElementById('acceptBtn');
        const celebration = document.getElementById('celebration');
        const finalPlea = document.getElementById('finalPlea');

        const messages = [
            "再想想吧！",
            "别拒绝我嘛！",
            "给我个机会！",
            "你真的忍心吗？",
            "点同意吧！",
            "就点一下同意嘛！"
        ];

        rejectBtn.addEventListener('click', function() {
            rejectCount++;

            if (rejectCount < 5) {
                // 随机移动按钮
                const maxX = window.innerWidth - 150;
                const maxY = window.innerHeight - 100;
                const newX = Math.random() * maxX;
                const newY = Math.random() * (maxY - 200) + 200;

                rejectBtn.style.position = 'fixed';
                rejectBtn.style.left = newX + 'px';
                rejectBtn.style.top = newY + 'px';

                // 缩小按钮
                const scale = Math.max(0.5, 1 - rejectCount * 0.15);
                rejectBtn.style.transform = `scale(${scale})`;

                // 显示消息
                alert(messages[rejectCount - 1] || messages[messages.length - 1]);
            } else {
                // 最后一次，隐藏按钮并显示最终请求
                rejectBtn.style.display = 'none';
                finalPlea.style.display = 'block';
            }
        });

        acceptBtn.addEventListener('click', function() {
            // 隐藏按钮，显示庆祝
            document.querySelector('.buttons').style.display = 'none';
            celebration.style.display = 'block';

            // 播放庆祝效果
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    createHeart();
                }, i * 100);
            }
        });

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '💖';
            heart.style.position = 'fixed';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            heart.style.fontSize = Math.random() * 30 + 20 + 'px';
            heart.style.pointerEvents = 'none';
            heart.style.zIndex = '1000';
            document.body.appendChild(heart);

            // 动画效果
            const animation = heart.animate([
                { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
                { transform: 'translateY(-100vh) rotate(360deg)', opacity: 0 }
            ], {
                duration: 3000,
                easing: 'ease-out'
            });

            animation.onfinish = () => heart.remove();
        }
    </script>
</body>
</html>
